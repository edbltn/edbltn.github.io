<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="34%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#241a3d"/>
      <stop offset="55%" stop-color="#181426"/>
      <stop offset="100%" stop-color="#100d18"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="20" y="20" width="1160" height="590" rx="22" fill="none" stroke="#322b4e" stroke-width="1.5"/>

  <!-- face mask, lifted from the live SVG; a few senses lit as a "chord" -->
  <g transform="translate(120,70) scale(0.84)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M200 40 C150 40 104 78 96 168 C89 212 87 256 96 300 C104 362 128 432 172 476 C185 500 215 500 228 476 C272 432 296 362 304 300 C313 256 311 212 304 168 C296 78 250 40 200 40 Z"
          fill="rgba(236,230,214,.022)" stroke="rgba(236,230,214,.20)" stroke-width="1.5"/>

    <!-- dim features -->
    <g stroke="rgba(236,230,214,.20)" stroke-width="1.6">
      <path d="M118 178 C150 152 250 152 282 178 C262 214 138 214 118 178 Z"/>
      <line x1="200" y1="162" x2="200" y2="192"/>
      <path d="M193 266 C191 300 191 332 188 350 C181 358 181 372 190 378 C196 381 204 381 210 378 C219 372 219 358 212 350 C209 332 209 300 207 266 Z"/>
      <ellipse cx="149" cy="336" rx="29" ry="22" transform="rotate(-8 149 336)"/>
      <ellipse cx="251" cy="336" rx="29" ry="22" transform="rotate(8 251 336)"/>
      <path d="M167 421 C176 414 187 413 196 417 C199 418 201 418 204 417 C213 413 224 414 233 421 C226 433 214 441 200 441 C186 441 174 433 167 421 Z"/>
    </g>

    <!-- lit: Photic eyes (gold) -->
    <g stroke="#F4D35E" stroke-width="2.4" filter="url(#glow)">
      <path d="M134 270 C146 259 166 259 178 270 C166 281 146 281 134 270 Z"/>
      <path d="M222 270 C234 259 254 259 266 270 C254 281 234 281 222 270 Z"/>
    </g>
    <!-- lit: Acoustic ears (teal) -->
    <g stroke="#54C7C1" stroke-width="2.4" filter="url(#glow)">
      <path d="M90 260 C74 258 66 282 70 306 C73 326 84 340 99 334 C98 310 92 282 90 260 Z"/>
      <path d="M310 260 C326 258 334 282 330 306 C327 326 316 340 301 334 C302 310 308 282 310 260 Z"/>
    </g>
    <!-- lit: Olfactory nose accent (violet) -->
    <g stroke="#B68CD8" stroke-width="2.2" filter="url(#glow)" opacity=".9">
      <path d="M193 266 C191 300 191 332 188 350 C181 358 181 372 190 378 C196 381 204 381 210 378 C219 372 219 358 212 350 C209 332 209 300 207 266 Z"/>
    </g>
  </g>

  <!-- wordmark -->
  <g font-family="Fraunces, 'Hoefler Text', Georgia, 'Times New Roman', serif">
    <text x="500" y="214" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
          font-size="20" letter-spacing="6" fill="#9b95b0">A COMBINATORIAL ATLAS OF MEDIA</text>
    <text x="498" y="320" font-size="118" font-weight="500" fill="#ECE6D6">Sensorium</text>
    <text x="500" y="392" font-family="'Spectral', Georgia, serif" font-size="29" fill="#c9b9d8">Every medium is a chord.</text>
    <text x="500" y="438" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#6f6a86">senses</text>
    <text x="585" y="438" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#E9C46A">×</text>
    <text x="606" y="438" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#6f6a86">operations</text>
    <text x="724" y="438" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#E9C46A">×</text>
    <text x="745" y="438" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#6f6a86">time</text>
    <text x="500" y="520" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="19" fill="#7f7a92">ericdidierbolton.com / sensorium</text>
  </g>
</svg>
