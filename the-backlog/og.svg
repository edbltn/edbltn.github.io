<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="desk" cx="50%" cy="-5%" r="95%">
      <stop offset="0%" stop-color="#34352f"/>
      <stop offset="70%" stop-color="#26271f"/>
      <stop offset="100%" stop-color="#1c1d17"/>
    </radialGradient>
    <pattern id="lines" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="7" fill="none"/><rect y="7" width="8" height="1" fill="rgba(0,0,0,.06)"/>
    </pattern>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#desk)"/>
  <rect width="1200" height="630" fill="url(#lines)"/>

  <!-- manila sheet -->
  <g filter="url(#paperShadow)">
    <rect x="70" y="52" width="1060" height="526" rx="3" fill="#f3ecd9" stroke="#b3a578" stroke-width="1.5"/>
  </g>
  <rect x="78" y="60" width="1044" height="510" rx="2" fill="none" stroke="#c9bd9a" stroke-width="1"/>

  <!-- classification banners -->
  <rect x="78" y="60" width="1044" height="40" fill="#16181d"/>
  <text x="600" y="86" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="16"
        letter-spacing="3" fill="#e9e4d2">FOR OFFICIAL USE ONLY · COMPLIANCE &amp; CONTROLS DIVISION · DO NOT DISTRIBUTE</text>
  <rect x="78" y="530" width="1044" height="40" fill="#16181d"/>
  <text x="600" y="556" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="16"
        letter-spacing="3" fill="#e9e4d2">DISCHARGE A CLAUSE · RAISE THREE MORE · RETAINED PER SCHEDULE</text>

  <!-- masthead -->
  <text x="108" y="152" font-family="'SF Mono', Menlo, monospace" font-size="15" letter-spacing="2.5"
        fill="#8b8268">OFFICE OF INTERNAL CONTROLS &amp; REGULATORY CONFORMANCE</text>
  <text x="104" y="246" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="92"
        letter-spacing="-1" fill="#1d2433">THE BACKLOG</text>
  <text x="108" y="292" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="29"
        fill="#454f63">Requisition &amp; Discharge Worksheet</text>
  <text x="108" y="330" font-family="'SF Mono', Menlo, monospace" font-size="16" letter-spacing="1.5"
        fill="#8b8268">FORM 27-B (REV. 14) · MANDATORY · RETAIN PER SCHEDULE</text>

  <line x1="108" y1="354" x2="760" y2="354" stroke="#c9bd9a" stroke-width="1"/>

  <!-- checklist -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#1d2433">
    <!-- discharged -->
    <rect x="108" y="378" width="26" height="26" rx="2" fill="none" stroke="#9c2a2a" stroke-width="2"/>
    <path d="M113 391 l6 7 l12 -15" fill="none" stroke="#9c2a2a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="150" y="398" fill="#9c2a2a" text-decoration="line-through">Reconcile ledger variance</text>
    <!-- open + spawns -->
    <rect x="108" y="420" width="26" height="26" rx="2" fill="none" stroke="#454f63" stroke-width="2"/>
    <text x="150" y="440">File evidence packet</text>
    <text x="150" y="468" font-family="'SF Mono', Menlo, monospace" font-size="15" fill="#8b8268">&#8212; raises 3 supplemental controls&#8230;</text>
    <!-- open -->
    <rect x="108" y="486" width="26" height="26" rx="2" fill="none" stroke="#454f63" stroke-width="2"/>
    <text x="150" y="506">Obtain attestation log (Schedule&#160;C)</text>
  </g>

  <!-- form number block -->
  <g font-family="'SF Mono', Menlo, monospace" font-size="15" fill="#454f63" text-anchor="end">
    <text x="1092" y="150">FORM 27-B</text>
    <text x="1092" y="172">OMB No. 0000-0000</text>
    <text x="1092" y="194">PAGE 1 OF &#8734;</text>
  </g>

  <!-- APPROVED stamp -->
  <g transform="rotate(-13 968 392)">
    <circle cx="968" cy="392" r="92" fill="none" stroke="#9c2a2a" stroke-width="4" opacity=".88"/>
    <circle cx="968" cy="392" r="80" fill="none" stroke="#9c2a2a" stroke-width="2" opacity=".88"/>
    <text x="968" y="384" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="34"
          letter-spacing="2" fill="#9c2a2a" opacity=".9">APPROVED</text>
    <text x="968" y="414" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="14"
          letter-spacing="2" fill="#9c2a2a" opacity=".9">FORM 27-B · REV. 14</text>
    <line x1="906" y1="398" x2="1030" y2="398" stroke="#9c2a2a" stroke-width="1.5" opacity=".55"/>
  </g>
</svg>
